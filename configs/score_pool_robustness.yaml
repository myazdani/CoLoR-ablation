seed: 17

paths:
  paper_code: ../color-filter-olmo
  existing_pool_analysis_dir: ../books-color-score-reproduction/artifacts/pool_analysis
  existing_score_reproduction_dir: ../books-color-score-reproduction
  output_dir: results/score-pool-robustness
  figures_dir: reports/score-pool-robustness/figures

target:
  name: books
  cond_checkpoint: assets/books_cond_hf
  marg_checkpoint: assets/books_marg_hf
  tokenizer: allenai/eleuther-ai-gpt-neox-20b-pii-special
  sequence_length: 512

token_recovery:
  mode: exact_from_hf_full_data
  index_source: csv_sidecar
  hf_repo: hlzhang109/CoLoR-filter
  remote_prefix: full_data/c4
  local_cache_dir: data/token_cache
  recovered_tokens: data/score_pool_tokens.npy
  recovered_meta: data/score_pool_meta.parquet
  recovery_plan: results/score-pool-robustness/token_recovery_plan.json
  recovery_locations: results/score-pool-robustness/token_recovery_locations.csv
  memmap_dtype: uint16
  sequence_length: 512
  pad_token_id: 1
  max_download_gb_without_confirmation: 25

scoring:
  batch_size: 64
  dtype: bf16
  device: auto
  shard_size: 5000
  total_layers: 12

metrics:
  cutoff_tau64: 0.3513622284
  pairwise_tasks:
    - hp_vs_hn
    - hp_vs_rn
    - hp_vs_tn
    - rp_vs_hn
    - rp_vs_rn
    - rp_vs_tn

variants:
  - id: full
    family: baseline
    cond_remove: []
    marg_remove: []
  - id: full_rescore
    family: baseline
    cond_remove: []
    marg_remove: []

